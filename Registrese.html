<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrese | Prolot</title>
    <link rel="stylesheet" href="static/Style.css">
    <link rel="stylesheet" href="static/Formularios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- ================= HEADER ================= -->
<header class="header">
  <div class="container header-flex">

    <div class="brand">
      <img src="Media/Logo 1.png" alt="Logo Prolot" class="logo">
      <a class="brand-name" href="index.html">PROLOT</a>
    </div>

    <nav class="nav">
      <details class="dropdown">
        <summary class="btn btn-dark">Opciones</summary>
        <div class="dropdown-menu">
          <a href="Redesociales.html">Redes sociales</a>
          <a href="Shop.html">Tienda en línea</a>
        </div>
      </details>

      <a href="Iniciarsesion.html" class="btn btn-primary">Iniciar sesión</a>
      <a href="Registrese.html" class="btn btn-danger">Regístrate</a>
    </nav>

  </div>
</header>

<section class="form-section">
    <div class="form-container">
        <h2>Bienveido al Registro de Prolot</h2>
        
        <p>Regitrate para continuar con tu experiencia de alto rendimiento</p>

        <form action="" class="prolot-form">
            <div class="input-group">
                <input type="text" placeholder="Nombres Completos" required>
                <i class="fa-solid fa-user icon"></i>
            </div>

            <div class="input-group">
                <input type="text" placeholder="Apellidos Completos" required>
                <i class="fa-solid fa-user icon"></i>
            </div>

            <div class="input-group">
                <input type="email" placeholder="Correo Electronico">
                <i class="fa-solid fa-envelope icon"></i>
            </div>
            <div class="input-group">
                <input type="tel" placeholder="Telefono">
                <i class="fa-solid fa-phone icon"></i>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Contraseña">
                <i class="fa-solid fa-lock icon"></i>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Verificar Contraseña">
                <i class="fa-solid fa-lock icon"></i>
            </div>
            <button type="submit" class="btn btn-primary form-submit">Registrarse</button>
            <div class="form-footer">
                ¿Ya tienes cuenta? <a href="Iniciarsesion.html">Inicia sesión aquí</a>
            </div>
        </form>
        
    </div>

</section>
<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 Prolot. Todos los derechos reservados.</p>
</footer>

</body>
</html>
