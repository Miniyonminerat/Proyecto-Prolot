<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion | Prolot</title>
    <link rel="stylesheet" href="/static/Formularios.css">
    <link rel="stylesheet" href="/static/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- ================= HEADER ================= -->
<header class="header">
  <div class="container header-flex">

    <div class="brand">
        <img src="../Media/Logo 1.png" alt="Logo Prolot" class="logo" >
        <a class="brand-name" href="/templates/Prehome.html">PROLOT</a>
    </div>

    <nav class="nav">
      <details class="dropdown">
        <summary class="btn btn-dark">Opciones</summary>
        <div class="dropdown-menu">
          <a href="Redesociales.html">Redes sociales</a>
          <a href="Shop.html">Tienda en línea</a>
        </div>
      </details>

      <a href="Iniciarsesion.html" class="btn btn-primary">Iniciar sesión</a>
      <a href="Registrese.html" class="btn btn-danger">Regístrate</a>
    </nav>

  </div>
</header>

<!-- ================= FORMULARIO DE INICIO DE SESIÓN ================= -->
<section class="form-section">
    <div class="form-container">
        <h2>Bienvenido a PROLOT</h2>
        <p>Inicia sesión para continuar con tu experiencia de alto rendimiento</p>
        
        <form action="#" method="POST" class="prolot-form">
            <div class="input-group">
                <!-- Colocamos el icono después del input para poder animarlo con CSS cuando hagamos foco -->
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <i class="fa-solid fa-envelope icon"></i>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Contraseña" required>
                <i class="fa-solid fa-lock icon"></i>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Recordarme
                </label>
                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn btn-primary form-submit">Iniciar sesión</button>
        </form>
        
        <div class="form-footer">
            ¿No tienes cuenta? <a href="Registrese.html">Regístrate aquí</a>
        </div>
    </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
    <p>© 2026 Prolot. Todos los derechos reservados.</p>
</footer>

    
</body>
</html>
